<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>CLEAR — Badges Moodle</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700;800&family=Open+Sans:wght@400;600&family=Lato:wght@400;700&display=swap"/>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --blue:    #1F6F9E;
    --blue2:   #2C8FBF;
    --cyan:    #4FB6D6;
    --green:   #8CBF3F;
    --green2:  #A3CF5A;
    --bg:      #F2F2F2;
    --border:  #D9D9D9;
    --text:    #0d1a26;
  }
  body {
    font-family: 'Lato', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }
  header {
    background: white;
    border-bottom: 1px solid var(--border);
    padding: 24px 48px;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .logo-text {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--blue);
    letter-spacing: 0.06em;
  }
  .logo-text span { font-weight: 400; color: #666; }
  .header-actions { display: flex; gap: 12px; align-items: center; }
  .btn {
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 600;
    border: none;
    cursor: pointer;
    padding: 8px 18px;
    border-radius: 6px;
    transition: all .18s;
    letter-spacing: .04em;
  }
  .btn-primary { background: var(--blue); color: white; }
  .btn-primary:hover { background: var(--blue2); }
  .btn-outline { background: white; color: var(--blue); border: 1.5px solid var(--blue); }
  .btn-outline:hover { background: var(--bg); }

  .page { padding: 48px; max-width: 1400px; margin: 0 auto; }
  .section-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 700;
    color: #999;
    letter-spacing: .12em;
    text-transform: uppercase;
    margin-bottom: 28px;
  }

  .badge-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
    gap: 32px;
    margin-bottom: 64px;
  }

  .badge-card {
    background: white;
    border-radius: 16px;
    padding: 32px 24px 24px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
    border: 1px solid var(--border);
    transition: all .2s;
    cursor: pointer;
    position: relative;
  }
  .badge-card:hover {
    transform: translateY(-4px);
    box-shadow: 0 12px 40px rgba(31,111,158,.12);
    border-color: var(--cyan);
  }
  .badge-card.selected {
    border-color: var(--blue);
    box-shadow: 0 0 0 3px rgba(31,111,158,.15);
  }

  .badge-svg-wrap { width: 160px; height: 160px; position: relative; }
  .badge-svg-wrap svg { width: 100%; height: 100%; }

  .badge-label {
    font-family: 'Montserrat', sans-serif;
    font-size: 13px;
    font-weight: 700;
    color: var(--text);
    text-align: center;
    line-height: 1.3;
  }
  .badge-desc {
    font-size: 11.5px;
    color: #888;
    text-align: center;
    line-height: 1.5;
  }

  .badge-download {
    margin-top: 4px;
    display: flex;
    gap: 8px;
  }
  .dl-btn {
    font-family: 'Montserrat', sans-serif;
    font-size: 10px;
    font-weight: 600;
    letter-spacing: .06em;
    padding: 5px 12px;
    border-radius: 5px;
    border: 1.5px solid var(--border);
    background: white;
    color: var(--blue);
    cursor: pointer;
    transition: all .15s;
  }
  .dl-btn:hover { border-color: var(--blue); background: #f0f7fc; }

  /* Tweaks panel */
  #tweaks-panel {
    display: none;
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: white;
    border: 1px solid var(--border);
    border-radius: 14px;
    padding: 20px;
    width: 240px;
    box-shadow: 0 8px 32px rgba(0,0,0,.1);
    z-index: 999;
  }
  #tweaks-panel.visible { display: block; }
  .tweaks-title {
    font-family: 'Montserrat', sans-serif;
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .1em;
    color: #888;
    text-transform: uppercase;
    margin-bottom: 16px;
  }
  .tweak-row { margin-bottom: 14px; }
  .tweak-row label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    color: #555;
    margin-bottom: 6px;
    font-family: 'Montserrat', sans-serif;
  }
  .tweak-row select, .tweak-row input[type=range] {
    width: 100%;
    font-size: 12px;
  }
  .tweak-row select {
    padding: 5px 8px;
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    background: white;
  }

  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: var(--blue);
    color: white;
    font-family: 'Montserrat', sans-serif;
    font-size: 12px;
    font-weight: 600;
    padding: 10px 20px;
    border-radius: 100px;
    opacity: 0;
    transition: all .3s;
    pointer-events: none;
    white-space: nowrap;
    z-index: 9999;
  }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<header>
  <div>
    <div class="logo-text">CLEAR <span>Evaluation francophone Afrique</span></div>
    <div style="font-size:11px;color:#aaa;margin-top:4px;font-family:'Open Sans',sans-serif;">Badges Moodle — Collection officielle</div>
  </div>
  <div class="header-actions">
    <button class="btn btn-outline" onclick="exportAll()">⬇ Tout exporter (PNG)</button>
    <button class="btn btn-primary" onclick="exportAll()">Générer les badges</button>
  </div>
</header>

<div class="page">
  <div class="section-title">Parcours pédagogique</div>
  <div class="badge-grid" id="badge-grid"></div>
</div>

<div id="tweaks-panel">
  <div class="tweaks-title">Tweaks</div>
  <div class="tweak-row">
    <label>Style</label>
    <select id="tweak-style" onchange="applyTweaks()">
      <option value="default">Défaut (dégradé)</option>
      <option value="flat">Plat (solid)</option>
      <option value="dark">Sombre</option>
    </select>
  </div>
  <div class="tweak-row">
    <label>Taille d'affichage</label>
    <input type="range" id="tweak-size" min="100" max="220" value="160" oninput="applyTweaks()"/>
  </div>
  <div class="tweak-row">
    <label>Afficher descriptions</label>
    <select id="tweak-desc" onchange="applyTweaks()">
      <option value="1">Oui</option>
      <option value="0">Non</option>
    </select>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
  "style": "default",
  "size": "105",
  "desc": "1"
}/*EDITMODE-END*/;
let tweaks = { ...TWEAK_DEFAULTS };

// ── Badge definitions ──────────────────────────────────────────────────────
const BADGES = [
  {
    id: 'quiz',
    label: 'Quiz Réussi',
    desc: 'Évaluation formative passée avec succès',
    color1: '#2C8FBF', color2: '#4FB6D6', accent: '#a8dff0',
    icon: 'quiz',
  },
  {
    id: 'devoir',
    label: 'Devoir Rendu',
    desc: 'Devoir soumis et validé par le formateur',
    color1: '#1F6F9E', color2: '#2C8FBF', accent: '#4FB6D6',
    icon: 'devoir',
  },
  {
    id: 'lecture',
    label: 'Lecture Complète',
    desc: 'Ressource pédagogique lue intégralement',
    color1: '#8CBF3F', color2: '#A3CF5A', accent: '#d4edaa',
    icon: 'lecture',
  },
  {
    id: 'video',
    label: 'Vidéo Visionnée',
    desc: 'Contenu vidéo visionné jusqu\'au bout',
    color1: '#1a5e7a', color2: '#2C8FBF', accent: '#4FB6D6',
    icon: 'video',
  },
  {
    id: 'forum',
    label: 'Forum Actif',
    desc: 'Contribution notable dans les discussions',
    color1: '#6a9e2e', color2: '#8CBF3F', accent: '#A3CF5A',
    icon: 'forum',
  },
  {
    id: 'module',
    label: 'Module Complété',
    desc: 'Toutes les activités du module terminées',
    color1: '#1F6F9E', color2: '#4FB6D6', accent: '#a8dff0',
    icon: 'module',
  },
  {
    id: 'cours',
    label: 'Cours Complété',
    desc: 'Formation CLEAR intégralement terminée',
    color1: '#0e3d5e', color2: '#1F6F9E', accent: '#4FB6D6',
    icon: 'diplome',
  },
  {
    id: 'excellence',
    label: 'Mention Excellence',
    desc: 'Résultats exceptionnels — Top 10%',
    color1: '#2C6E1A', color2: '#8CBF3F', accent: '#e8f7b0',
    icon: 'trophy',
  },
  {
    id: 'certificat',
    label: 'Certificat CLEAR',
    desc: 'Certification officielle CLEAR FA',
    color1: '#0a2e45', color2: '#1F6F9E', accent: '#4FB6D6',
    icon: 'cert',
  }
];

// ── SVG icon paths ─────────────────────────────────────────────────────────
function getIcon(type, size = 40) {
  const s = size;
  const cx = 125, cy = 108;
  switch(type) {

    case 'quiz': {
      // Question mark bold
      return `
        <text x="${cx}" y="${cy+s*.28}" text-anchor="middle" font-family="Montserrat,sans-serif" font-weight="800" font-size="${s*.72}" fill="white" opacity=".95">?</text>
        <circle cx="${cx+s*.02}" cy="${cy+s*.5}" r="${s*.08}" fill="white" opacity=".95"/>
      `;
    }

    case 'devoir': {
      // Pencil writing on paper
      return `
        <rect x="${cx-s*.3}" y="${cy-s*.38}" width="${s*.52}" height="${s*.64}" rx="${s*.05}" fill="white" opacity=".18" stroke="white" stroke-width="${s*.035}"/>
        <line x1="${cx-s*.18}" y1="${cy-s*.16}" x2="${cx+s*.14}" y2="${cy-s*.16}" stroke="white" stroke-width="${s*.05}" stroke-linecap="round" opacity=".9"/>
        <line x1="${cx-s*.18}" y1="${cy}" x2="${cx+s*.14}" y2="${cy}" stroke="white" stroke-width="${s*.05}" stroke-linecap="round" opacity=".7"/>
        <line x1="${cx-s*.18}" y1="${cy+s*.16}" x2="${cx+s*.04}" y2="${cy+s*.16}" stroke="white" stroke-width="${s*.05}" stroke-linecap="round" opacity=".5"/>
        <g transform="rotate(-35,${cx+s*.34},${cy+s*.24})">
          <rect x="${cx+s*.26}" y="${cy+s*.04}" width="${s*.16}" height="${s*.44}" rx="${s*.04}" fill="white" opacity=".9"/>
          <polygon points="${cx+s*.26},${cy+s*.48} ${cx+s*.42},${cy+s*.48} ${cx+s*.34},${cy+s*.62}" fill="white" opacity=".9"/>
        </g>
      `;
    }

    case 'lecture': {
      // Open book
      return `
        <path d="M${cx},${cy-s*.3} L${cx},${cy+s*.32}" stroke="white" stroke-width="${s*.05}" stroke-linecap="round" opacity=".8"/>
        <path d="M${cx},${cy-s*.3} Q${cx-s*.1},${cy-s*.38} ${cx-s*.42},${cy-s*.28} L${cx-s*.42},${cy+s*.3} Q${cx-s*.12},${cy+s*.2} ${cx},${cy+s*.32}" fill="white" opacity=".25" stroke="white" stroke-width="${s*.03}"/>
        <path d="M${cx},${cy-s*.3} Q${cx+s*.1},${cy-s*.38} ${cx+s*.42},${cy-s*.28} L${cx+s*.42},${cy+s*.3} Q${cx+s*.12},${cy+s*.2} ${cx},${cy+s*.32}" fill="white" opacity=".25" stroke="white" stroke-width="${s*.03}"/>
        <line x1="${cx-s*.34}" y1="${cy-s*.1}" x2="${cx-s*.1}" y2="${cy-s*.14}" stroke="white" stroke-width="${s*.04}" stroke-linecap="round" opacity=".7"/>
        <line x1="${cx-s*.34}" y1="${cy+s*.04}" x2="${cx-s*.1}" y2="${cy}" stroke="white" stroke-width="${s*.04}" stroke-linecap="round" opacity=".6"/>
        <line x1="${cx+s*.1}" y1="${cy-s*.14}" x2="${cx+s*.34}" y2="${cy-s*.1}" stroke="white" stroke-width="${s*.04}" stroke-linecap="round" opacity=".7"/>
        <line x1="${cx+s*.1}" y1="${cy}" x2="${cx+s*.34}" y2="${cy+s*.04}" stroke="white" stroke-width="${s*.04}" stroke-linecap="round" opacity=".6"/>
      `;
    }

    case 'video': {
      // Play button in screen
      return `
        <rect x="${cx-s*.42}" y="${cy-s*.28}" width="${s*.84}" height="${s*.56}" rx="${s*.08}" fill="white" opacity=".18" stroke="white" stroke-width="${s*.035}"/>
        <polygon points="${cx-s*.16},${cy-s*.22} ${cx+s*.26},${cy} ${cx-s*.16},${cy+s*.22}" fill="white" opacity=".95"/>
      `;
    }

    case 'forum': {
      // Speech bubbles
      return `
        <rect x="${cx-s*.38}" y="${cy-s*.38}" width="${s*.54}" height="${s*.38}" rx="${s*.08}" fill="white" opacity=".9"/>
        <polygon points="${cx-s*.22},${cy} ${cx-s*.08},${cy} ${cx-s*.22},${cy+s*.18}" fill="white" opacity=".9"/>
        <rect x="${cx-s*.14}" y="${cy-s*.1}" width="${s*.54}" height="${s*.38}" rx="${s*.08}" fill="white" opacity=".5" stroke="white" stroke-width="${s*.03}"/>
        <polygon points="${cx+s*.2},${cy+s*.28} ${cx+s*.34},${cy+s*.28} ${cx+s*.34},${cy+s*.46}" fill="white" opacity=".5"/>
      `;
    }

    case 'module': {
      // Grid of 4 squares → checkmark overlay
      const g = s*.16, off = s*.12;
      return `
        <rect x="${cx-off-g}" y="${cy-off-g}" width="${g*1.6}" height="${g*1.6}" rx="${s*.04}" fill="white" opacity=".9"/>
        <rect x="${cx+off*0.2}" y="${cy-off-g}" width="${g*1.6}" height="${g*1.6}" rx="${s*.04}" fill="white" opacity=".6"/>
        <rect x="${cx-off-g}" y="${cy+off*0.2}" width="${g*1.6}" height="${g*1.6}" rx="${s*.04}" fill="white" opacity=".6"/>
        <rect x="${cx+off*0.2}" y="${cy+off*0.2}" width="${g*1.6}" height="${g*1.6}" rx="${s*.04}" fill="white" opacity=".35"/>
        <polyline points="${cx-s*.22},${cy+s*.06} ${cx-s*.04},${cy+s*.24} ${cx+s*.3},${cy-s*.2}" stroke="white" stroke-width="${s*.1}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      `;
    }

    case 'diplome': {
      // Scroll / diploma
      return `
        <rect x="${cx-s*.36}" y="${cy-s*.26}" width="${s*.72}" height="${s*.52}" rx="${s*.06}" fill="white" opacity=".18" stroke="white" stroke-width="${s*.035}"/>
        <line x1="${cx-s*.22}" y1="${cy-s*.08}" x2="${cx+s*.22}" y2="${cy-s*.08}" stroke="white" stroke-width="${s*.045}" stroke-linecap="round" opacity=".9"/>
        <line x1="${cx-s*.22}" y1="${cy+s*.06}" x2="${cx+s*.22}" y2="${cy+s*.06}" stroke="white" stroke-width="${s*.045}" stroke-linecap="round" opacity=".7"/>
        <line x1="${cx-s*.22}" y1="${cy+s*.2}" x2="${cx+s*.04}" y2="${cy+s*.2}" stroke="white" stroke-width="${s*.045}" stroke-linecap="round" opacity=".5"/>
        <circle cx="${cx+s*.18}" cy="${cy+s*.36}" r="${s*.14}" fill="white" opacity=".9"/>
        <circle cx="${cx+s*.18}" cy="${cy+s*.36}" r="${s*.08}" fill="none" stroke="#1F6F9E" stroke-width="${s*.04}"/>
      `;
    }

    case 'trophy': {
      return `
        <path d="M${cx-s*.28},${cy-s*.32} L${cx-s*.28},${cy+s*.04} Q${cx-s*.28},${cy+s*.28} ${cx},${cy+s*.28} Q${cx+s*.28},${cy+s*.28} ${cx+s*.28},${cy+s*.04} L${cx+s*.28},${cy-s*.32} Z" fill="white" opacity=".9"/>
        <path d="M${cx-s*.28},${cy-s*.24} Q${cx-s*.52},${cy-s*.24} ${cx-s*.52},${cy} Q${cx-s*.52},${cy+s*.2} ${cx-s*.28},${cy+s*.08}" fill="none" stroke="white" stroke-width="${s*.08}" opacity=".6"/>
        <path d="M${cx+s*.28},${cy-s*.24} Q${cx+s*.52},${cy-s*.24} ${cx+s*.52},${cy} Q${cx+s*.52},${cy+s*.2} ${cx+s*.28},${cy+s*.08}" fill="none" stroke="white" stroke-width="${s*.08}" opacity=".6"/>
        <rect x="${cx-s*.14}" y="${cy+s*.28}" width="${s*.28}" height="${s*.1}" rx="${s*.03}" fill="white" opacity=".7"/>
        <rect x="${cx-s*.22}" y="${cy+s*.38}" width="${s*.44}" height="${s*.07}" rx="${s*.03}" fill="white" opacity=".5"/>
      `;
    }

    case 'cert': {
      return `
        <polygon points="${pts5(cx,cy-s*.06,s*.38)}" fill="white" opacity=".15"/>
        <polygon points="${pts5(cx,cy-s*.06,s*.27)}" fill="none" stroke="white" stroke-width="${s*.04}" opacity=".85"/>
        <polyline points="${cx-s*.15},${cy-s*.04} ${cx-s*.04},${cy+s*.1} ${cx+s*.2},${cy-s*.16}" stroke="white" stroke-width="${s*.1}" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      `;
    }

    default: return '';
  }
}

function pts5(cx,cy,r){
  const pts=[];
  for(let i=0;i<5;i++){
    const a=(i*72-90)*Math.PI/180;
    pts.push(`${cx+r*Math.cos(a)},${cy+r*Math.sin(a)}`);
  }
  return pts.join(' ');
}

// ── Build badge SVG ────────────────────────────────────────────────────────
function buildBadgeSVG(b, sz = 250) {
  const S = sz;
  const cx = S/2, cy = S/2;
  const r = S * 0.44;
  const style = tweaks.style;

  // gradient or flat fill
  let fillDef = '', fill = '';
  const gid = `g_${b.id}`;

  if(style === 'dark') {
    const d1 = darken(b.color1), d2 = darken(b.color2);
    fillDef = `<radialGradient id="${gid}" cx="40%" cy="35%" r="70%"><stop offset="0%" stop-color="${d2}"/><stop offset="100%" stop-color="${d1}"/></radialGradient>`;
    fill = `url(#${gid})`;
  } else if(style === 'flat') {
    fill = b.color1;
  } else {
    fillDef = `<radialGradient id="${gid}" cx="38%" cy="30%" r="75%"><stop offset="0%" stop-color="${b.color2}"/><stop offset="100%" stop-color="${b.color1}"/></radialGradient>`;
    fill = `url(#${gid})`;
  }

  // outer decorative ring segments
  const ringColor = style === 'dark' ? darken(b.accent) : b.accent;
  const outerR = r + S*0.05;

  // shimmer highlight
  const shimmer = style === 'flat' ? '' :
    `<ellipse cx="${cx-r*0.18}" cy="${cy-r*0.32}" rx="${r*0.35}" ry="${r*0.22}" fill="white" opacity="0.12"/>`;

  // decorative dots on ring
  const dots = [];
  for(let i=0;i<12;i++){
    const a = (i*30) * Math.PI/180;
    const dr = outerR + S*0.025;
    dots.push(`<circle cx="${cx+dr*Math.cos(a)}" cy="${cy+dr*Math.sin(a)}" r="${S*0.013}" fill="${ringColor}" opacity="${i%3===0?'0.9':'0.35'}"/>`);
  }

  const icon = getIcon(b.icon, S*0.16);

  // bottom text arc
  const textR = r * 0.72;

  return `<svg xmlns="http://www.w3.org/2000/svg" width="${S}" height="${S}" viewBox="0 0 ${S} ${S}">
  <defs>
    ${fillDef}
    <filter id="shadow_${b.id}" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="${S*0.016}" stdDeviation="${S*0.024}" flood-color="${b.color1}" flood-opacity="0.35"/>
    </filter>
    <clipPath id="clip_${b.id}"><circle cx="${cx}" cy="${cy}" r="${r}"/></clipPath>
  </defs>

  <!-- Outer glow ring -->
  <circle cx="${cx}" cy="${cy}" r="${outerR}" fill="none" stroke="${ringColor}" stroke-width="${S*0.018}" opacity="0.4"/>
  <circle cx="${cx}" cy="${cy}" r="${outerR + S*0.018}" fill="none" stroke="${ringColor}" stroke-width="${S*0.006}" opacity="0.2"/>

  <!-- Decorative dots -->
  ${dots.join('\n  ')}

  <!-- Main circle -->
  <circle cx="${cx}" cy="${cy}" r="${r}" fill="${fill}" filter="url(#shadow_${b.id})"/>

  <!-- Inner border -->
  <circle cx="${cx}" cy="${cy}" r="${r - S*0.022}" fill="none" stroke="white" stroke-width="${S*0.012}" opacity="0.3" clip-path="url(#clip_${b.id})"/>

  <!-- Shimmer -->
  ${shimmer}

  <!-- Icon -->
  <g transform="translate(0, ${-S*0.06})">${icon}</g>

  <!-- Label text -->
  <text x="${cx}" y="${cy + S*0.19}" text-anchor="middle"
    font-family="Montserrat, sans-serif" font-weight="700"
    font-size="${S*0.088}" fill="white" letter-spacing="0.5">
    ${b.label.split(' ').length > 2 ? b.label.split(' ').slice(0,2).join(' ') : b.label}
  </text>
  ${b.label.split(' ').length > 2 ? `<text x="${cx}" y="${cy + S*0.28}" text-anchor="middle"
    font-family="Montserrat, sans-serif" font-weight="700"
    font-size="${S*0.076}" fill="white" opacity="0.9" letter-spacing="0.5">
    ${b.label.split(' ').slice(2).join(' ')}
  </text>` : ''}

  <!-- Bottom CLEAR label -->
  <text x="${cx}" y="${cy + r - S*0.048}" text-anchor="middle"
    font-family="Montserrat, sans-serif" font-weight="600"
    font-size="${S*0.052}" fill="white" opacity="0.6" letter-spacing="1.5">
    CLEAR FA
  </text>
</svg>`;
}

function darken(hex) {
  const n = parseInt(hex.slice(1),16);
  const r=Math.floor((n>>16)*0.6), g=Math.floor(((n>>8)&0xff)*0.6), b=Math.floor((n&0xff)*0.6);
  return `#${[r,g,b].map(x=>x.toString(16).padStart(2,'0')).join('')}`;
}

// ── Render grid ────────────────────────────────────────────────────────────
function render() {
  const grid = document.getElementById('badge-grid');
  grid.innerHTML = '';
  const sz = parseInt(tweaks.size);
  BADGES.forEach(b => {
    const card = document.createElement('div');
    card.className = 'badge-card';
    card.innerHTML = `
      <div class="badge-svg-wrap" style="width:${sz}px;height:${sz}px">
        ${buildBadgeSVG(b, sz * 1.5625 | 0)}
      </div>
      <div class="badge-label">${b.label}</div>
      ${tweaks.desc == 1 ? `<div class="badge-desc">${b.desc}</div>` : ''}
      <div class="badge-download">
        <button class="dl-btn" onclick="downloadBadge('${b.id}', 250)">PNG 250px</button>
        <button class="dl-btn" onclick="downloadBadge('${b.id}', 500)">PNG 500px</button>
      </div>
    `;
    grid.appendChild(card);
  });
}

// ── Export PNG ─────────────────────────────────────────────────────────────
function downloadBadge(id, px) {
  const b = BADGES.find(x => x.id === id);
  const svgStr = buildBadgeSVG(b, px);
  const blob = new Blob([svgStr], { type: 'image/svg+xml' });
  const url = URL.createObjectURL(blob);
  const canvas = document.createElement('canvas');
  canvas.width = px; canvas.height = px;
  const ctx = canvas.getContext('2d');
  const img = new Image();
  img.onload = () => {
    ctx.drawImage(img, 0, 0);
    const a = document.createElement('a');
    a.download = `CLEAR_badge_${id}_${px}.png`;
    a.href = canvas.toDataURL('image/png');
    a.click();
    URL.revokeObjectURL(url);
    showToast(`Badge "${b.label}" exporté (${px}px)`);
  };
  img.src = url;
}

function exportAll() {
  BADGES.forEach((b, i) => setTimeout(() => downloadBadge(b.id, 500), i * 300));
}

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

// ── Tweaks ─────────────────────────────────────────────────────────────────
function applyTweaks() {
  tweaks.style = document.getElementById('tweak-style').value;
  tweaks.size  = document.getElementById('tweak-size').value;
  tweaks.desc  = document.getElementById('tweak-desc').value;
  window.parent.postMessage({ type: '__edit_mode_set_keys', edits: tweaks }, '*');
  render();
}

window.addEventListener('message', e => {
  if(e.data?.type === '__activate_edit_mode') document.getElementById('tweaks-panel').classList.add('visible');
  if(e.data?.type === '__deactivate_edit_mode') document.getElementById('tweaks-panel').classList.remove('visible');
});
window.parent.postMessage({ type: '__edit_mode_available' }, '*');

// Init
render();
</script>
</body>
